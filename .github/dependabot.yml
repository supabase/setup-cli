version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 1
    cooldown:
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 1
    cooldown:
      semver-minor-days: 7
      semver-patch-days: 2
    groups:
      bun-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
