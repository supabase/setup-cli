version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      bun-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      bun-production:
        dependency-type: production
        update-types:
          - minor
          - patch
